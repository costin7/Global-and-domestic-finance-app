name: 每日更新并部署

on:
  schedule:
    - cron: "0 0 * * *"        # UTC 00:00 = 北京时间 08:00
  workflow_dispatch: {}         # 手动触发（Actions 页面 Run workflow）
  push:
    branches: [main]            # 改代码后自动重新部署（不重新跑 AI）

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        if: github.event_name != 'push'
        run: pip install requests

      - name: 抓取行情
        if: github.event_name != 'push'
        run: python scripts/fetch_market.py

      - name: 抓取新闻
        if: github.event_name != 'push'
        run: python scripts/fetch_news.py

      - name: AI 分析生成 data.json（模型由 AI_BASE_URL / AI_MODEL 变量决定）
        if: github.event_name != 'push'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
        run: python scripts/analyze.py

      - name: 提交数据更新
        if: github.event_name != 'push'
        run: |
          git config user.name "fincompass-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "chore: 每日数据更新 $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git push

      - name: 组装站点
        run: |
          mkdir -p _site/data
          cp index.html _site/
          cp data/data.json _site/data/

      - name: 配置 Pages（首次运行自动启用）
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 上传站点产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
