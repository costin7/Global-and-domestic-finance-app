/* ================= 工具函数 ================= */
const $ = (s, r) => (r || document).querySelector(s);
const el = (tag, cls, text) => {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
};
const NS = "http://www.w3.org/2000/svg";
const svgEl = (tag, attrs) => {
  const n = document.createElementNS(NS, tag);
  for (const k in (attrs || {})) n.setAttribute(k, attrs[k]);
  return n;
};
const cssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
const fmt = (v, d) => Number(v).toLocaleString("zh-CN", { maximumFractionDigits: d ?? 2 });
const signed = (v, unit) => (v > 0 ? "+" : v < 0 ? "−" : "") + fmt(Math.abs(v), Math.abs(v) < 10 ? 2 : 1) + (unit || "");
function niceTicks(min, max, n) {
  if (min === max) { min -= 1; max += 1; }
  const span = max - min, step0 = span / (n || 4);
  const mag = Math.pow(10, Math.floor(Math.log10(step0)));
  const norm = step0 / mag;
  const step = (norm >= 5 ? 10 : norm >= 2.2 ? 5 : norm >= 1.2 ? 2 : 1) * mag;
  const lo = Math.floor(min / step) * step, hi = Math.ceil(max / step) * step;
  const ticks = [];
  for (let t = lo; t <= hi + 1e-9; t += step) ticks.push(Math.round(t * 1e6) / 1e6);
  return { lo, hi, ticks };
}

/* ================= 提示框 ================= */
const tooltip = {
  node: null,
  show(rows, title, x, y) {
    const t = this.node; t.textContent = "";
    if (title) t.appendChild(el("div", "tt-t", title));
    for (const r of rows) {
      const row = el("div", "row");
      const k = el("span", "k"); k.style.background = r.color || "transparent";
      if (!r.color) k.style.width = "0";
      row.appendChild(k);
      row.appendChild(el("span", "n", r.name));
      row.appendChild(el("span", "v", r.value));
      t.appendChild(row);
    }
    t.style.display = "block";
    const pad = 14, w = t.offsetWidth, h = t.offsetHeight;
    let px = x + pad, py = y + pad;
    if (px + w > innerWidth - 8) px = x - w - pad;
    if (py + h > innerHeight - 8) py = y - h - pad;
    t.style.left = px + "px"; t.style.top = py + "px";
  },
  hide() { this.node.style.display = "none"; }
};

/* ================= 图表：容器 + 表格孪生 ================= */
function makeFigure(container, title, subtitle, tableSpec) {
  const fig = el("figure", "viz");
  const hd = el("div", "fig-hd");
  hd.appendChild(el("span", "t", title));
  hd.appendChild(el("span", "s", subtitle || ""));
  const btn = el("button", "tbl-btn", "表格");
  hd.appendChild(btn);
  fig.appendChild(hd);
  const body = el("div", "fig-body");
  fig.appendChild(body);
  container.appendChild(fig);
  let showingTable = false, renderChart = null;
  btn.addEventListener("click", () => {
    showingTable = !showingTable;
    btn.textContent = showingTable ? "图表" : "表格";
    body.textContent = "";
    if (showingTable) body.appendChild(buildTable(tableSpec));
    else renderChart && renderChart();
  });
  function buildTable(spec) {
    const wrap = el("div", "tblwrap");
    const tb = el("table");
    const trh = el("tr");
    spec.head.forEach(h => trh.appendChild(el("th", null, h)));
    tb.appendChild(trh);
    spec.rows.forEach(r => {
      const tr = el("tr");
      r.forEach(c => tr.appendChild(el("td", null, String(c))));
      tb.appendChild(tr);
    });
    wrap.appendChild(tb);
    return wrap;
  }
  return {
    body,
    setRenderer(fn) { renderChart = fn; if (!showingTable) fn(); },
    isTable: () => showingTable
  };
}

function roundedBarPath(x, y, w, h, r, roundEnd) {
  r = Math.min(r, h / 2, Math.abs(w));
  if (w <= 0) return "";
  if (roundEnd === "right")
    return `M${x},${y} h${w - r} a${r},${r} 0 0 1 ${r},${r} v${h - 2 * r} a${r},${r} 0 0 1 ${-r},${r} h${-(w - r)} z`;
  return `M${x + w},${y} v${h} h${-(w - r)} a${r},${r} 0 0 1 ${-r},${-r} v${-(h - 2 * r)} a${r},${r} 0 0 1 ${r},${-r} z`;
}

/* 横向发散条形图（红涨绿跌，值标注于端点） */
function renderDivergingBars(container, opts) {
  const rows = opts.rows;
  const fig = makeFigure(container, opts.title, opts.subtitle, {
    head: [opts.labelHead || "项目", opts.valueHead || "数值"],
    rows: rows.map(r => [r.label, signed(r.value, opts.unit)])
  });
  fig.setRenderer(draw);
  addEventListener("resize", debounce(() => { if (!fig.isTable()) draw(); }, 200));
  function draw() {
    fig.body.textContent = "";
    const W = Math.max(320, fig.body.clientWidth || container.clientWidth || 600);
    const barH = 17, gap = 11, mL = opts.labelWidth || 96, mR = 56, mT = 8, mB = 22;
    const H = mT + rows.length * (barH + gap) - gap + mB;
    const svg = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, width: W, height: H, role: "img" });
    svg.setAttribute("aria-label", opts.title);
    const vals = rows.map(r => r.value);
    const { lo, hi, ticks } = niceTicks(Math.min(0, ...vals), Math.max(0, ...vals), 5);
    const xScale = v => mL + (v - lo) / (hi - lo) * (W - mL - mR);
    ticks.forEach(t => {
      svg.appendChild(svgEl("line", { x1: xScale(t), y1: mT - 2, x2: xScale(t), y2: H - mB, stroke: cssVar("--grid"), "stroke-width": 1 }));
      const tx = svgEl("text", { x: xScale(t), y: H - 6, "text-anchor": "middle", "font-size": 11, fill: cssVar("--muted") });
      tx.textContent = t + (opts.unit || "");
      svg.appendChild(tx);
    });
    svg.appendChild(svgEl("line", { x1: xScale(0), y1: mT - 2, x2: xScale(0), y2: H - mB, stroke: cssVar("--baseline"), "stroke-width": 1.5 }));
    rows.forEach((r, i) => {
      const y = mT + i * (barH + gap);
      const lb = svgEl("text", { x: mL - 8, y: y + barH / 2 + 4, "text-anchor": "end", "font-size": 12, fill: cssVar("--ink-2") });
      lb.textContent = r.label;
      svg.appendChild(lb);
      const x0 = xScale(0), x1 = xScale(r.value);
      const up = r.value >= 0;
      const path = svgEl("path", {
        d: up ? roundedBarPath(x0, y, x1 - x0, barH, 4, "right")
              : roundedBarPath(x1, y, x0 - x1, barH, 4, "left"),
        fill: up ? cssVar("--up-mark") : cssVar("--down-mark"),
        tabindex: 0
      });
      const vt = svgEl("text", {
        x: up ? x1 + 6 : x1 - 6, y: y + barH / 2 + 4,
        "text-anchor": up ? "start" : "end",
        "font-size": 11.5, "font-weight": 600, fill: cssVar("--ink")
      });
      vt.textContent = signed(r.value, opts.unit);
      const hit = svgEl("rect", { x: mL, y: y - gap / 2, width: W - mL - mR, height: barH + gap, fill: "transparent" });
      const showTip = (e) => {
        path.setAttribute("opacity", "0.82");
        const pt = e.touches ? e.touches[0] : e;
        tooltip.show([{ name: r.label, value: signed(r.value, opts.unit), color: up ? cssVar("--up-mark") : cssVar("--down-mark") }],
          r.note || opts.tipTitle || "", pt.clientX ?? (innerWidth / 2), pt.clientY ?? 100);
      };
      const hideTip = () => { path.removeAttribute("opacity"); tooltip.hide(); };
      hit.addEventListener("pointermove", showTip);
      hit.addEventListener("pointerleave", hideTip);
      path.addEventListener("focus", (e) => { const b = path.getBoundingClientRect(); tooltip.show([{ name: r.label, value: signed(r.value, opts.unit) }], r.note || "", b.right, b.top); });
      path.addEventListener("blur", hideTip);
      svg.appendChild(path); svg.appendChild(vt); svg.appendChild(hit);
    });
    fig.body.appendChild(svg);
  }
}

/* 多序列折线图（十字线 + 全序列提示框 + 端点直标 + 图例） */
function renderLineChart(container, opts) {
  const { xLabels, series } = opts;
  const fig = makeFigure(container, opts.title, opts.subtitle, {
    head: [opts.xHead || "时间", ...series.map(s => s.name)],
    rows: xLabels.map((x, i) => [x, ...series.map(s => s.values[i] == null ? "—" : fmt(s.values[i], 2) + (opts.unit || ""))])
  });
  if (series.length >= 2) {
    const lg = el("div", "legend");
    series.forEach(s => {
      const it = el("span", "it");
      const sw = el("span", "sw-line"); sw.style.background = s.color;
      it.appendChild(sw); it.appendChild(el("span", null, s.name));
      lg.appendChild(it);
    });
    container.querySelector("figure.viz:last-of-type .fig-hd").after(lg);
  }
  fig.setRenderer(draw);
  addEventListener("resize", debounce(() => { if (!fig.isTable()) draw(); }, 200));
  function draw() {
    fig.body.textContent = "";
    const W = Math.max(320, fig.body.clientWidth || container.clientWidth || 600);
    const H = opts.height || 240, mL = 42, mR = opts.rightMargin || 92, mT = 12, mB = 26;
    const svg = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, width: W, height: H, role: "img" });
    svg.setAttribute("aria-label", opts.title);
    const all = series.flatMap(s => s.values).filter(v => v != null);
    let base = opts.baseline != null ? [opts.baseline] : [];
    const { lo, hi, ticks } = niceTicks(Math.min(...all, ...base), Math.max(...all, ...base), 4);
    const xS = i => mL + i / Math.max(1, xLabels.length - 1) * (W - mL - mR);
    const yS = v => mT + (1 - (v - lo) / (hi - lo)) * (H - mT - mB);
    ticks.forEach(t => {
      svg.appendChild(svgEl("line", { x1: mL, y1: yS(t), x2: W - mR + 30, y2: yS(t), stroke: cssVar("--grid"), "stroke-width": 1 }));
      const tx = svgEl("text", { x: mL - 6, y: yS(t) + 4, "text-anchor": "end", "font-size": 11, fill: cssVar("--muted") });
      tx.textContent = t + (opts.unit || "");
      svg.appendChild(tx);
    });
    xLabels.forEach((x, i) => {
      if (xLabels.length > 8 && i % 2) return;
      const tx = svgEl("text", { x: xS(i), y: H - 8, "text-anchor": "middle", "font-size": 11, fill: cssVar("--muted") });
      tx.textContent = x;
      svg.appendChild(tx);
    });
    if (opts.baseline != null) {
      svg.appendChild(svgEl("line", { x1: mL, y1: yS(opts.baseline), x2: W - mR + 30, y2: yS(opts.baseline), stroke: cssVar("--baseline"), "stroke-width": 1.5 }));
      const bl = svgEl("text", { x: W - mR + 32, y: yS(opts.baseline) + 4, "font-size": 11, fill: cssVar("--muted") });
      bl.textContent = opts.baselineLabel || String(opts.baseline);
      svg.appendChild(bl);
    }
    const crossline = svgEl("line", { y1: mT, y2: H - mB, stroke: cssVar("--baseline"), "stroke-width": 1, opacity: 0 });
    svg.appendChild(crossline);
    const endLabels = [];
    series.forEach(s => {
      const pts = s.values.map((v, i) => v == null ? null : [xS(i), yS(v)]).filter(Boolean);
      let d = "";
      let prev = null;
      s.values.forEach((v, i) => {
        if (v == null) { prev = null; return; }
        const X = xS(i), Y = yS(v);
        if (prev == null) d += `M${X},${Y}`;
        else if (s.step) d += `L${X},${prev[1]} L${X},${Y}`;
        else d += ` L${X},${Y}`;
        prev = [X, Y];
      });
      if (s.area) {
        const first = pts[0], last = pts[pts.length - 1];
        const ad = d + ` L${last[0]},${H - mB} L${first[0]},${H - mB} Z`;
        svg.appendChild(svgEl("path", { d: ad, fill: s.color, opacity: 0.1 }));
      }
      svg.appendChild(svgEl("path", { d, fill: "none", stroke: s.color, "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round" }));
      const last = pts[pts.length - 1];
      svg.appendChild(svgEl("circle", { cx: last[0], cy: last[1], r: 4.5, fill: s.color, stroke: cssVar("--surface"), "stroke-width": 2 }));
      const lastVal = s.values.filter(v => v != null).slice(-1)[0];
      endLabels.push({ y: last[1], x: last[0], name: s.short || s.name, val: lastVal, color: s.color });
    });
    endLabels.sort((a, b) => a.y - b.y);
    for (let i = 1; i < endLabels.length; i++)
      if (endLabels[i].y - endLabels[i - 1].y < 15) endLabels[i].y = endLabels[i - 1].y + 15;
    endLabels.forEach(L => {
      const t = svgEl("text", { x: L.x + 9, y: L.y + 4, "font-size": 11.5, fill: cssVar("--ink-2") });
      const tv = svgEl("tspan", { "font-weight": 650, fill: cssVar("--ink") });
      tv.textContent = fmt(L.val, 2) + (opts.unit || "");
      t.textContent = (series.length > 1 ? L.name + " " : "");
      t.appendChild(tv);
      svg.appendChild(t);
    });
    const hit = svgEl("rect", { x: mL, y: mT, width: W - mL - mR + 30, height: H - mT - mB, fill: "transparent" });
    hit.addEventListener("pointermove", (e) => {
      const rect = svg.getBoundingClientRect();
      const relX = (e.clientX - rect.left) * (W / rect.width);
      let idx = Math.round((relX - mL) / ((W - mL - mR) / Math.max(1, xLabels.length - 1)));
      idx = Math.max(0, Math.min(xLabels.length - 1, idx));
      crossline.setAttribute("x1", xS(idx)); crossline.setAttribute("x2", xS(idx));
      crossline.setAttribute("opacity", 1);
      tooltip.show(series.map(s => ({
        name: s.name, color: s.color,
        value: s.values[idx] == null ? "—" : fmt(s.values[idx], 2) + (opts.unit || "")
      })), xLabels[idx], e.clientX, e.clientY);
    });
    hit.addEventListener("pointerleave", () => { crossline.setAttribute("opacity", 0); tooltip.hide(); });
    svg.appendChild(hit);
    fig.body.appendChild(svg);
  }
}

/* 100% 堆叠横条（配置结构） */
function renderStackedBar(container, opts) {
  const segs = opts.segments;
  const total = segs.reduce((a, s) => a + s.pct, 0);
  const fig = makeFigure(container, opts.title, opts.subtitle, {
    head: ["资产类别", "建议占比", "说明"],
    rows: segs.map(s => [s.label, s.pct + "%", s.note || ""])
  });
  fig.setRenderer(draw);
  addEventListener("resize", debounce(() => { if (!fig.isTable()) draw(); }, 200));
  function draw() {
    fig.body.textContent = "";
    const W = Math.max(320, fig.body.clientWidth || container.clientWidth || 600);
    const H = 34, barH = 26;
    const svg = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, width: W, height: H, role: "img" });
    svg.setAttribute("aria-label", opts.title);
    const segColor = s => (s.color && s.color.startsWith("--")) ? cssVar(s.color) : s.color;
    let x = 0;
    segs.forEach((s, i) => {
      const w = s.pct / total * W - (i < segs.length - 1 ? 2 : 0);
      const r = svgEl("rect", { x, y: 4, width: Math.max(0, w), height: barH, rx: 4, fill: segColor(s), tabindex: 0 });
      const show = (e) => {
        r.setAttribute("opacity", "0.85");
        const pt = e.touches ? e.touches[0] : e;
        tooltip.show([{ name: s.label, value: s.pct + "%", color: segColor(s) }], s.note || "建议配置比例", pt.clientX ?? innerWidth / 2, pt.clientY ?? 100);
      };
      const hide = () => { r.removeAttribute("opacity"); tooltip.hide(); };
      r.addEventListener("pointermove", show);
      r.addEventListener("pointerleave", hide);
      r.addEventListener("focus", () => { const b = r.getBoundingClientRect(); tooltip.show([{ name: s.label, value: s.pct + "%" }], s.note || "", b.left + b.width / 2, b.top); });
      r.addEventListener("blur", hide);
      svg.appendChild(r);
      if (w > 58) {
        const t = svgEl("text", { x: x + w / 2, y: 4 + barH / 2 + 4, "text-anchor": "middle", "font-size": 11.5, "font-weight": 600, fill: "#ffffff" });
        t.textContent = `${s.label} ${s.pct}%`;
        svg.appendChild(t);
      }
      x += s.pct / total * W;
    });
    fig.body.appendChild(svg);
    const lg = el("div", "legend");
    segs.forEach(s => {
      const it = el("span", "it");
      const sw = el("span", "sw-rect"); sw.style.background = segColor(s);
      it.appendChild(sw); it.appendChild(el("span", null, `${s.label} ${s.pct}%`));
      lg.appendChild(it);
    });
    fig.body.appendChild(lg);
  }
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

    title: "平衡型参考配置框架",

  });

  const lt = el("div", "card");
  lt.appendChild(el("h2", null, "🏔️ 长期方向（1 年以上）"));
  lt.appendChild(el("div", "desc", "着眼于估值、股息与长期产业趋势，适合定投或分批建仓"));
  const ltg = el("div", "fund-grid");
  DATA.funds.longTerm.forEach(f => ltg.appendChild(fundCard(f)));
  lt.appendChild(ltg);
  fp.appendChild(lt);
  const st = el("div", "card");
  st.appendChild(el("h2", null, "🌊 短期方向（1-6 个月）"));
  st.appendChild(el("div", "desc", "跟随当前政策与资金热点，波动更大，需设定退出纪律"));
  const stg = el("div", "fund-grid");
  DATA.funds.shortTerm.forEach(f => stg.appendChild(fundCard(f)));
  st.appendChild(stg);
  fp.appendChild(st);
  const fn = el("div", "card prose");
  fn.appendChild(el("h2", null, "操作要点"));
  DATA.funds.notes.forEach(p => {
    const d = el("div", "callout");
    d.textContent = p;
    fn.appendChild(d);
  });
  fp.appendChild(fn);

  /* ---- 投机观察 ---- */
  const sp = $("#panel-spec");
  sp.appendChild(el("div", "sec-title", "投机观察（高风险）"));
  const swb = el("div", "warn-banner");
  const sb = el("b", null, "⚠️ 高风险警示：");
  swb.appendChild(sb);
  swb.appendChild(document.createTextNode("以下主题波动剧烈、可能快速亏损，仅为热点观察而非建议。若参与，请务必遵守："));
  const ul = el("ul");
  DATA.spec.rules.forEach(r => ul.appendChild(el("li", null, r)));
  swb.appendChild(ul);
  sp.appendChild(swb);
  DATA.spec.items.forEach(it => {
    const c = el("article", "spec-card");
    const hd = el("div", "hd");
    hd.appendChild(el("h4", null, it.theme));
    hd.appendChild(el("span", "hot", it.heat));
    c.appendChild(hd);
    const dl = el("dl");
    const add = (k, v, cls) => {
      dl.appendChild(el("dt", null, k));
      dl.appendChild(el("dd", cls || null, v));
    };
    add("驱动因素", it.drivers);
    add("潜在催化", it.catalysts);
    add("相关品种", it.vehicles);
    add("主要风险", it.risks, "risk");
    add("参与纪律", it.discipline);
    c.appendChild(dl);
    sp.appendChild(c);
  });

  /* ---- 页脚 ---- */
  const srcList = $("#src-list");
  DATA.sources.forEach(s => {
    const a = el("a", null, s.name);
    a.href = s.url; a.target = "_blank"; a.rel = "noopener";
    srcList.appendChild(a);
  });
  $("#full-disc").textContent = DATA.meta.fullDisclaimer;
}

/* ================= 标签页与主题 ================= */
function initTabs() {
  const tabs = [...document.querySelectorAll(".tab")];
  function activate(name) {
    tabs.forEach(t => t.setAttribute("aria-selected", t.dataset.tab === name ? "true" : "false"));
    document.querySelectorAll("main section[role=tabpanel]").forEach(s => s.classList.toggle("active", s.id === "panel-" + name));
    dispatchEvent(new Event("resize"));
  }
  tabs.forEach(t => t.addEventListener("click", () => activate(t.dataset.tab)));
  activate("overview");
}
function initTheme() {
  const order = ["auto", "light", "dark"];
  let mode = "auto";
  const apply = () => {
    const sysDark = matchMedia("(prefers-color-scheme: dark)").matches;
    const dark = mode === "dark" || (mode === "auto" && sysDark);
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    $("#theme-btn").textContent = mode === "auto" ? "🌓 主题·自动" : (mode === "dark" ? "🌙 深色" : "☀️ 浅色");
    document.querySelectorAll("main section").forEach(() => {});
    dispatchEvent(new Event("theme"));
  };
  $("#theme-btn").addEventListener("click", () => {
    mode = order[(order.indexOf(mode) + 1) % order.length];
    apply();
    rerenderCharts();
  });
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", apply);
  apply();
}
function rerenderCharts() {
  document.querySelectorAll("main section").forEach(s => s.textContent = "");
  $("#src-list").textContent = "";
  renderAll();
  initTabsKeepActive();
}
function initTabsKeepActive() {
  const cur = [...document.querySelectorAll(".tab")].find(t => t.getAttribute("aria-selected") === "true");
  const name = cur ? cur.dataset.tab : "overview";
  document.querySelectorAll("main section[role=tabpanel]").forEach(s => s.classList.toggle("active", s.id === "panel-" + name));
}

tooltip.node = $("#tooltip");
(async function boot() {
  let live = false;
  try {
    const r = await fetch("data/data.json?v=" + Date.now(), { cache: "no-store" });
    if (r.ok) { DATA = await r.json(); live = true; }
  } catch (e) { /* file:// 或离线时走内置快照 */ }
  if (!DATA || !DATA.meta) DATA = FALLBACK_DATA;
  window.__dataLive = live;
  renderAll();
  initTabs();
  initTheme();
})();
</script>
